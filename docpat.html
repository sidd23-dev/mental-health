<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mental Health - Role Selection</title>
   <style>
    /* CareConnect Theme Integration */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif; /* Matching CareConnect Font */
        background: #f4f6fb; /* CareConnect Light Blue-Grey Background */
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        background: #ffffff;
        padding: 50px 40px;
        border-radius: 8px; /* Squared corners matching dashboard cards */
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        width: 100%;
        max-width: 450px;
        text-align: center;
        border: 1px solid #e2e6f0;
    }

    .welcome h1 {
        color: #2a4d9b; /* CareConnect Primary Blue */
        font-size: 32px;
        margin-bottom: 15px;
        font-weight: 700;
    }

    .welcome p {
        color: #555; /* Neutral grey for readability */
        font-size: 16px;
        margin-bottom: 30px;
    }

    .role-cards {
        display: flex;
        gap: 15px;
        margin-top: 20px;
        flex-direction: column;
    }

    .role-card {
        background: #fff;
        border: 2px solid #e2e6f0;
        border-radius: 8px;
        padding: 25px 25px;
        cursor: pointer;
        transition: 0.3s;
        position: relative;
    }

    .role-card:hover {
        border-color: #2a4d9b;
        background: #fcfdfe;
        transform: translateY(-3px);
    }

    /* Selected state using CareConnect Blue */
    .role-card.selected {
        background: #2a4d9b;
        border-color: #2a4d9b;
        color: white;
    }

    .role-icon {
        font-size: 40px;
        margin-bottom: 10px;
        display: block;
    }

    .continue-btn {
        width: 100%;
        padding: 18px;
        background: #2a4d9b;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 25px;
        display: none;
        transition: 0.2s;
    }

    .continue-btn:hover {
        background: #1e3a75;
    }

    .continue-btn.active {
        display: block;
    }

    /* ⭐ Admin Login Box - CareConnect Style */
    .admin-box {
        margin-top: 35px;
        background: #f0f3ff;
        padding: 10px 20px;
        border-radius: 4px;
        display: inline-block;
        border: 1px solid #2a4d9b;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        color: #2a4d9b;
        transition: 0.2s;
    }

    .admin-box:hover {
        background: #2a4d9b;
        color: white;
    }

</style>
</head>
<body>

    <div class="container">

        <div class="welcome">
            <h1>Welcome!</h1>
            <p>AI-Driven Mental Health Assessment & Stress Detection System</p>
        </div>

        <p style="color:#2d5a27; font-weight:600; margin-bottom:10px;">
            Choose your role to continue
        </p>

        <div class="role-cards">
            <div class="role-card patient" onclick="selectRole('patient')">
                <div class="role-icon">👤</div>
                <div class="role-title">Patient</div>
                <div class="role-desc">AI stress detection, mood tracking and therapy booking</div>
            </div>

            <div class="role-card doctor" onclick="selectRole('doctor')">
                <div class="role-icon">👨‍⚕️</div>
                <div class="role-title">Doctor</div>
                <div class="role-desc">Consult patients, view AI analysis & manage schedule</div>
            </div>
        </div>

        <button class="continue-btn" id="continue-btn" onclick="goToLogin()">Continue →</button>

        <!-- ⭐ Admin Login Small Box -->
        <div class="admin-box" onclick="goToAdmin()">
            🔒 Admin Login
        </div>

    </div>

    <script>
        let selectedRole = '';

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-card').forEach(card => card.classList.remove('selected'));
            event.target.closest('.role-card').classList.add('selected');
            document.getElementById('continue-btn').classList.add('active');
        }

        function goToLogin() {
            if (!selectedRole) {
                alert("Please choose a role");
                return;
            }
            localStorage.setItem("userRole", selectedRole);
            window.location.href = selectedRole === "patient" ? "patlogin.html" : "doclogin.html";
        }

        function goToAdmin() {
            window.location.href = "admlogin.html";
        }
    </script>

</body>
</html>
