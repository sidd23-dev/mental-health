<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Updated to CareConnect Palette */
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6fb; /* CareConnect Background */
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .card{
            width:360px;
            background:#ffffff;
            padding:28px 26px;
            border-radius:8px; /* Squared corners like dashboard cards */
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); /* CareConnect Shadow */
            border: 1px solid #e2e6f0;
        }
        .title{
            text-align:center;
            margin-bottom:4px;
            font-size:22px;
            font-weight:700;
            color:#2a4d9b; /* CareConnect Primary Blue */
        }
        .subtitle{
            text-align:center;
            font-size:12px;
            color:#555;
            margin-bottom:18px;
            letter-spacing:0.5px;
            text-transform:uppercase;
        }
        .input-group{
            margin-bottom:14px;
        }
        label{
            display:block;
            font-size:13px;
            font-weight:600;
            margin-bottom:6px;
            color:#2a4d9b;
        }
        input{
            width:100%;
            padding:9px 10px;
            border:1px solid #e2e6f0;
            border-radius:4px;
            font-size:14px;
            background: #fcfdfe;
            transition: border-color .2s;
        }
        input:focus{
            outline:none;
            border-color:#2a4d9b;
            box-shadow:0 0 0 2px rgba(42, 77, 155, 0.1);
        }
        .btn{
            width:100%;
            padding:11px;
            border:none;
            border-radius:4px;
            background:#2a4d9b;
            color:#fff;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            margin-top:6px;
            transition: background .2s;
        }
        .btn:hover{
            background:#1e3a75;
        }
        .error{
            margin-top:6px;
            color:#e53935; /* btn-danger color */
            font-size:12px;
            display:none;
            text-align: center;
        }
        .row{
            display:flex;
            gap:10px;
        }
        .row .input-group{
            flex:1;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 class="title">Admin Login</h1>
    <p class="subtitle">System Control Access</p>

    <p id="adminError" class="error"></p>

    <div class="row">
        <div class="input-group">
            <label for="adminId">Admin ID</label>
            <input type="text" id="adminId" placeholder="ADM-001">
        </div>
        <div class="input-group">
            <label for="adminEmail">Email</label>
            <input type="email" id="adminEmail" placeholder="admin@example.com">
        </div>
    </div>

    <div class="input-group">
        <label for="adminPassword">Password</label>
        <input type="password" id="adminPassword" placeholder="••••••••">
    </div>

    <button class="btn" id="loginBtn" onclick="adminLogin()">Login</button>
</div>

<script>
    const API_URL = 'http://localhost:5000';

    function showError(msg){
        const el = document.getElementById('adminError');
        el.innerText = msg;
        el.style.display = 'block';
    }

    async function adminLogin(){
        document.getElementById('adminError').style.display = 'none';

        const adminId = document.getElementById('adminId').value.trim();
        const email   = document.getElementById('adminEmail').value.trim();
        const password= document.getElementById('adminPassword').value.trim();

        if(!adminId || !email || !password){
            showError('Admin ID, email and password are required.');
            return;
        }

        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerText = 'Checking...';

        try{
            const res = await fetch(`${API_URL}/api/admin/login`,{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({ adminId, email, password })
            });
            const data = await res.json();

            if(res.ok && data.success){
    // 1. Save the key for the Security Gate
    localStorage.setItem('adminToken', data.token || 'secure-admin-session');
    localStorage.setItem('adminEmail', data.email || email);
    
    // 2. Go to the dashboard
    window.location.href = 'admindashboard.html'; 
}

            else{
                showError(data.message || 'Invalid admin credentials.');
                btn.disabled = false;
                btn.innerText = 'Login';
            }
        }catch(err){
            console.error('Admin login error:', err);
            showError('Server error. Try again.');
            btn.disabled = false;
            btn.innerText = 'Login';
        }
    }
</script>

</body>
</html>
