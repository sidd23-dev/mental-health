<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Access - AI HEAL</title>
    <style>
    /* CareConnect Theme Integration - User Signup */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
        font-family: Arial, sans-serif; 
        background: #f4f6fb; 
        min-height: 100vh; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        padding: 20px; 
    }

    .container { 
        background: #ffffff; 
        padding: 30px; 
        border-radius: 8px; /* Squared corners matching dashboard */
        width: 100%; 
        max-width: 550px; 
        box-shadow: 0 2px 8px rgba(0,0,0,0.06); 
        border: 1px solid #e2e6f0;
    }

    h2 { 
        color: #2a4d9b; /* CareConnect Primary Blue */
        margin-bottom: 20px; 
        text-align: center; 
        font-weight: bold;
    }
    
    .photo-preview { 
        width: 100px; 
        height: 100px; 
        border-radius: 50%; 
        background: #f0f3ff; 
        border: 2px solid #2a4d9b; 
        margin: 0 auto 15px; 
        overflow: hidden; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-size: 40px; 
        color: #2a4d9b;
    }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
    
    .signup-scroll { 
        max-height: 400px; 
        overflow-y: auto; 
        padding-right: 10px; 
        margin-bottom: 20px; 
    }
    /* CareConnect Custom Scrollbar */
    .signup-scroll::-webkit-scrollbar { width: 5px; }
    .signup-scroll::-webkit-scrollbar-track { background: #f4f6fb; }
    .signup-scroll::-webkit-scrollbar-thumb { background: #2a4d9b; border-radius: 10px; }
    
    .section-tag { 
        font-size: 11px; 
        font-weight: 800; 
        color: #2a4d9b; 
        text-transform: uppercase; 
        margin: 20px 0 10px; 
        border-bottom: 1px solid #f0f3ff; 
        letter-spacing: 1px; 
        display: block; 
    }
    
    input, select, textarea { 
        width: 100%; 
        padding: 12px; 
        margin-bottom: 12px; 
        border: 1px solid #e2e6f0; 
        border-radius: 4px; 
        font-size: 14px; 
        background: #fcfdfe;
        color: #333;
    }
    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #2a4d9b;
        box-shadow: 0 0 0 2px rgba(42, 77, 155, 0.1);
    }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    
    .btn { 
        width: 100%; 
        padding: 15px; 
        background: #2a4d9b; 
        color: white; 
        border: none; 
        border-radius: 4px; 
        font-weight: bold; 
        cursor: pointer; 
        transition: background 0.2s; 
        font-size: 16px;
    }
    .btn:hover { background: #1e3a75; }
    
    .toggle-link { 
        color: #2a4d9b; 
        cursor: pointer; 
        display: block; 
        text-align: center; 
        margin-top: 15px; 
        font-weight: 600; 
        font-size: 14px;
        text-decoration: none;
    }
    .toggle-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
    <div id="loginView">
        <h2>Patient Login</h2>
        <input type="email" id="lEmail" placeholder="Email Address">
        <input type="password" id="lPass" placeholder="Password">
        <button class="btn" onclick="handleLogin()">Login</button>
        <span class="toggle-link" onclick="showView('signupView')">Create New Account</span>
    </div>

    <div id="signupView" style="display:none">
        <h2>Register Profile</h2>
        <form id="signupForm">
            <div class="photo-preview" id="photoPreview">👤</div>
            <div style="text-align:center; margin-bottom:15px;">
                <label style="background:#2d5a27; color:white; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:12px;">
                    Choose Photo <input type="file" name="photo" id="photoInput" accept="image/*" style="display:none">
                </label>
            </div>

            <div class="signup-scroll">
                <span class="section-tag">Account Credentials</span>
                <input type="email" name="email" id="sEmail" placeholder="Email Address *" required>
                <div class="form-row">
                    <input type="password" name="password" placeholder="Password *" required>
                    <input type="password" placeholder="Confirm Password *" required>
                </div>

                <span class="section-tag">Personal Information</span>
                <input type="text" name="fullName" placeholder="Full Name *" required>
                <div class="form-row">
                    <input type="date" name="dob" id="dob" required>
                    <input type="number" name="age" id="age" placeholder="Age" readonly>
                </div>
                <div class="form-row">
                    <select name="gender" required><option value="">Gender *</option><option>Male</option><option>Female</option></select>
                    <select name="bloodGroup"><option value="">Blood Group</option><option>A+</option><option>B+</option><option>O+</option><option>AB+</option></select>
                </div>
                <input type="tel" name="phone" placeholder="Phone Number *" required>

                <span class="section-tag">Address</span>
                <input type="text" name="address" placeholder="Street Address">
                <div class="form-row">
                    <input type="text" name="city" placeholder="City">
                    <input type="text" name="state" placeholder="State">
                </div>

                <span class="section-tag">Medical History</span>
                <textarea name="allergies" placeholder="Any Allergies?"></textarea>
                <textarea name="conditions" placeholder="Chronic Conditions"></textarea>

                <span class="section-tag">Emergency Contact</span>
                <input type="text" name="eName" placeholder="Contact Person Name">
                <div class="form-row">
                    <input type="text" name="eRelation" placeholder="Relationship">
                    <input type="tel" name="ePhone" placeholder="Contact Phone">
                </div>
            </div>
            <button type="button" class="btn" id="regBtn" onclick="triggerOTP(event)">Send OTP & Register</button>
        </form>
        <span class="toggle-link" onclick="showView('loginView')">Already have an account? Login</span>
    </div>

    <div id="otpView" style="display:none; text-align:center;">
        <h2>Verify OTP</h2>
        <p style="margin-bottom:15px; font-size:14px;">Enter the verification code</p>
        <input type="text" id="otpInp" maxlength="6" style="text-align:center; font-size:24px; letter-spacing:8px;">
        <button class="btn" onclick="verifyAndFinish()">Verify & Complete</button>
    </div>
</div>

<script>
    const API_URL = "http://127.0.0.1:5000/api";

    const showView = (id) => {
        document.querySelectorAll('#loginView, #signupView, #otpView').forEach(v => v.style.display='none');
        document.getElementById(id).style.display = 'block';
    }

    // Photo Preview
    document.getElementById('photoInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => document.getElementById('photoPreview').innerHTML = `<img src="${event.target.result}">`;
        reader.readAsDataURL(e.target.files[0]);
    });

    // Age Auto-calc
    document.getElementById('dob').addEventListener('change', function() {
        const age = new Date().getFullYear() - new Date(this.value).getFullYear();
        document.getElementById('age').value = age;
    });

    async function triggerOTP(event) {
    // 1. STOP the page from redirecting/refreshing
    if (event) {
        event.preventDefault(); 
        console.log('Prevent default')
    }

    const form = document.getElementById('signupForm');
    
    // 2. Check if all required fields are filled
    if(!form.checkValidity()) {
        form.reportValidity(); // This shows the "Please fill out this field" tooltips
        return;
    }

    const formData = new FormData(form);
    const btn = document.getElementById('regBtn');
    
    // UI Feedback
    btn.innerText = "Sending OTP...";
    btn.disabled = true;

    try {
        const res = await fetch(`${API_URL}/signup`, { 
            method: 'POST', 
            body: formData // Note: No headers needed for FormData, fetch adds them automatically
        });
        
        const data = await res.json();
        
        if(data.success) {
            localStorage.setItem('tempEmail', document.getElementById('sEmail').value);
            showView('otpView'); // This will now work without the page refreshing!
        } else {
            alert("Signup failed: " + data.message);
        }
    } catch (e) { 
        console.error(e);
        alert("Connection Error: Is your backend server running on port 5000?"); 
    } finally {
        btn.innerText = "Send OTP & Register";
        btn.disabled = false;
    }
}

    async function verifyAndFinish() {
        const email = localStorage.getItem('tempEmail');
        const otp = document.getElementById('otpInp').value;
        try {
            const res = await fetch(`${API_URL}/verify-otp`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, otp })
            });
            const data = await res.json();
            if(data.success) {
                alert("Account Verified Successfully!");
                showView('loginView');
            } else { alert("Invalid OTP"); }
        } catch (e) { alert("Error connecting to server"); }
    }

    async function handleLogin() {
        const email = document.getElementById('lEmail').value;
        const password = document.getElementById('lPass').value;
        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('userData', JSON.stringify(data.user));
                window.location.href = "patdash.html";
            } else { alert(data.message); }
        } catch (e) { alert("Login failed. Check server."); }
    }
</script>
</body>
</html>
