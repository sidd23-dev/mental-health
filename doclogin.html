<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Portal - AI HEAL</title>
    <style>
        /* CareConnect Professional Theme */
        body { 
            font-family: Arial, sans-serif; 
            background: #f4f6fb; /* CareConnect Background */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: #333;
        }
        .box { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; /* Squared corners like dashboard cards */
            width: 380px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); 
            border: 1px solid #e2e6f0;
        }
        h2 { 
            text-align: center; 
            color: #2a4d9b; /* CareConnect Primary Blue */
            margin-bottom: 20px; 
            font-size: 22px;
        }
        
        /* Profile Image Style */
        .photo-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .profile-preview { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid #2a4d9b; 
            background: #f0f3ff; 
            cursor: pointer; 
        }
        #fileInput { display: none; }
        .upload-label { 
            font-size: 12px; 
            color: #2a4d9b; 
            font-weight: bold; 
            margin-top: 8px; 
            cursor: pointer; 
        }

        input, select, button { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 4px; 
            border: 1px solid #e2e6f0; 
            box-sizing: border-box; 
            font-size: 14px; 
            background: #fcfdfe;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2a4d9b;
            box-shadow: 0 0 0 2px rgba(42, 77, 155, 0.1);
        }
        button { 
            background: #2a4d9b; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            transition: 0.2s; 
            margin-top: 15px; 
        }
        button:hover { 
            background: #1e3a75; 
        }
        button:disabled {
            background: #cbd2e1;
            cursor: not-allowed;
        }
        .hidden { display: none; }
        .link { 
            color: #2a4d9b; 
            cursor: pointer; 
            text-align: center; 
            display: block; 
            margin-top: 15px; 
            font-size: 14px; 
            font-weight: bold; 
        }
        p { color: #555; }
    </style>
</head>
<body>
    <div class="box">
        <div id="loginView">
            <h2>Doctor Login</h2>
            <input type="email" id="lEmail" placeholder="Email Address">
            <input type="password" id="lPass" placeholder="Password">
            <button onclick="login()">Login</button>
            <span class="link" onclick="toggle('regView')">New Doctor? Create Account</span>
        </div>

        <div id="regView" class="hidden">
            <h2>Doctor Registration</h2>
            <form id="regForm">
                <div class="photo-container">
                    <img src="https://via.placeholder.com/100" id="preview" class="profile-preview" onclick="document.getElementById('fileInput').click()">
                    <span class="upload-label" onclick="document.getElementById('fileInput').click()">Choose Photo</span>
                    <input type="file" name="photo" id="fileInput" accept="image/*" onchange="previewImage(event)">
                </div>

                <input type="text" name="firstName" placeholder="First Name" required>
                <input type="text" name="lastName" placeholder="Last Name" required>
                <input type="email" name="email" id="rEmail" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <input type="text" name="clinicName" placeholder="Hospital/Clinic Name" required>

                <input type="number" name="experience" placeholder="Years of Experience" min="0" required>

                <select name="specialization">
                    <option value="">Select Specialization</option>
                    <option>Psychiatrist</option>
                    <option>Psychologist</option>
                    <option>Counsellor</option>
                </select>
                <input type="text" name="registrationId" placeholder="Medical Reg ID" required>

<label style="font-size: 13px; color: #555; display: block; margin-top: 10px;">Upload your certificate(To Check you are a verified Doctor) (PDF/Image)</label>
<input type="file" name="certificate" accept=".pdf,image/*" required>

<button type="button" id="otpBtn" onclick="signup()">Send OTP</button>
            </form>
            <span class="link" onclick="toggle('loginView')">Already have an account? Login</span>
        </div>

        <div id="otpView" class="hidden">
            <h2>Verify Email</h2>
            <p style="text-align:center; font-size:12px;">Enter the code sent to your email</p>
            <input type="text" id="otpCode" placeholder="6-digit OTP" style="text-align:center; letter-spacing: 5px; font-size: 20px;">
            <button onclick="verify()">Verify & Submit</button>
        </div>
    </div>

    <script>
        const API = "http://127.0.0.1:5000/api/doctor";

        function toggle(id) { 
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('regView').classList.add('hidden');
            document.getElementById('otpView').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('preview').src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        async function signup() {
            const btn = document.getElementById('otpBtn');
            btn.innerText = "Sending...";
            btn.disabled = true;

            const fd = new FormData(document.getElementById('regForm'));
            try {
                const res = await fetch(`${API}/signup`, { method: 'POST', body: fd });
                const data = await res.json();
                if (data.success) {
                    toggle('otpView');
                } else {
                    alert(data.message || "Signup Failed");
                    btn.innerText = "Send OTP";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Server Connection Error");
                console.log(err)
                btn.innerText = "Send OTP";
                btn.disabled = false;
            }
        }

       async function verify() {
    const email = document.getElementById('rEmail').value;
    const otp = document.getElementById('otpCode').value;
    try {
        const res = await fetch(`http://127.0.0.1:5000/api/doctor/verify-otp`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, otp })
        });
        const data = await res.json();
        if (data.success) { 
            alert("Verified! You can now Login."); 
            toggle('loginView'); 
        } else {
            alert(data.message);
        }
    } catch(e) { alert("Verification failed"); }
}

    

        async function login() {
    try {
        const res = await fetch(`${API}/login`, { // Points to http://127.0.0.1:5000/api/doctor/login
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                email: document.getElementById('lEmail').value, 
                password: document.getElementById('lPass').value 
            })
        });
        const data = await res.json();
        
        if (data.success) {
            // Save the unique email to identify the doctor on the next page
            localStorage.setItem('docEmail', data.doctor.email);
            window.location.href = "docpage.html";
        } else {
            alert(data.message);
        }
    } catch(e) { 
        alert("Login Error: Check if server is running"); 
    }
}
    </script>
</body>
</html>
